storage:
  s3:
    endpoint: http://s3.example.internal:9000
    bucket: layerhouse

certManager:
  enabled: true
  issuerRef:
    name: layerhouse-ca
    kind: ClusterIssuer
    group: cert-manager.io

server:
  tls:
    dnsNames:
      - registry.example.internal
      - layerhouse-nodeport.example.internal
