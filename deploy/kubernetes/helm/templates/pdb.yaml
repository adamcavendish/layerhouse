{{- if .Values.podDisruptionBudget.enabled }}
{{- $replicas := int .Values.replicaCount }}
{{- $defaultMinAvailable := add (div $replicas 2) 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "layerhouse.fullname" . }}
  namespace: {{ include "layerhouse.namespace" . }}
  labels:
    {{- include "layerhouse.labels" . | nindent 4 }}
spec:
  minAvailable: {{ default $defaultMinAvailable .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "layerhouse.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
