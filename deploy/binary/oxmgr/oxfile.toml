version = 1

# layerhouse binary deployment — process group managed by oxmgr.
#
#   oxmgr apply oxfile.toml
#
# Prerequisites:
#   - RustFS running on 127.0.0.1:9000 (or configure endpoint below)
#   - layerhouse binary in $PATH
#   - Config files in ./config/ or set LAYERHOUSE_CONFIG

[[apps]]
name = "layerhouse"
command = "layerhouse-server --config ./config/standalone.toml"
restart_policy = "always"
stop_timeout_secs = 60
max_restarts = 10
