    <text x="3" y="82" fill="#94a3b8" font-family="Inter, Satoshi, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="760" letter-spacing="0">OCI registry for layered storage</text>
