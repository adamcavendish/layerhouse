      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#38bdf8" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="720" height="216" rx="18" fill="url(#panel)" stroke="rgba(226,232,240,.12)"/>
  <g transform="translate(38 25)" filter="url(#glow)">
    <path d="M24 65 96 25l72 40v118H24Z" fill="url(#shell)"/>
    <path d="M24 65 96 25l72 40v22L96 47 24 87Z" fill="url(#roof)"/>
    <path d="M96 25 168 65" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" opacity=".66"/>
    <path d="M24 65 96 25" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" opacity=".48"/>
    <rect x="46" y="91" width="34" height="28" rx="6" fill="#1e293b"/>
    <rect x="92" y="91" width="34" height="28" rx="6" fill="#475569"/>
    <rect x="138" y="91" width="18" height="28" rx="6" fill="url(#accent)"/>
    <rect x="46" y="132" width="34" height="28" rx="6" fill="#64748b"/>
    <rect x="92" y="132" width="64" height="28" rx="6" fill="#334155"/>
    <path d="M46 175H156" stroke="#64748b" stroke-width="8" stroke-linecap="round" opacity=".42"/>
