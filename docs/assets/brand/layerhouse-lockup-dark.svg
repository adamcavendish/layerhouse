<svg xmlns="http://www.w3.org/2000/svg" width="720" height="216" viewBox="0 0 720 216" role="img" aria-labelledby="title desc">
  <title id="title">Layerhouse Grid Store lockup, dark</title>
  <desc id="desc">Layerhouse wordmark with a light house-shaped repository grid logo for dark backgrounds.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="720" y2="216" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="shell" x1="34" y1="26" x2="158" y2="172" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="roof" x1="24" y1="28" x2="172" y2="82" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbe7f5"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="82" x2="158" y2="114" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow" x="-22%" y="-22%" width="146%" height="156%">
