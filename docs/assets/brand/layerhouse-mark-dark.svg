    <path d="M64 23 110 48.5" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity=".66"/>
    <path d="M18 48.5 64 23" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity=".48"/>
    <rect x="32" y="58" width="22" height="18" rx="4" fill="#1e293b"/>
    <rect x="61" y="58" width="22" height="18" rx="4" fill="#475569"/>
    <rect x="90" y="58" width="12" height="18" rx="4" fill="url(#accent)"/>
    <rect x="32" y="84" width="22" height="18" rx="4" fill="#64748b"/>
    <rect x="61" y="84" width="41" height="18" rx="4" fill="#334155"/>
