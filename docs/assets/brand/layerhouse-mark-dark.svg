<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Layerhouse Grid Store mark, dark</title>
  <desc id="desc">A light house-shaped repository grid optimized for dark backgrounds with layered storage bays and a cyan active bay.</desc>
  <defs>
    <linearGradient id="shell" x1="22" y1="18" x2="106" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="roof" x1="16" y1="18" x2="112" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbe7f5"/>
    </linearGradient>
    <linearGradient id="accent" x1="78" y1="50" x2="105" y2="73" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#38bdf8"/>
